server:
  port: ${JAVACLAW_PORT:3007}

spring:
  application:
    name: javaclaw-gateway

  # R2DBC reactive datasource (runtime queries)
  r2dbc:
    url: r2dbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:javaclaw}?sslMode=DISABLED
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:NyD0+oFDoOB+9cdVtnMonWFf4ZkDpTTs}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  flyway:
    enabled: true
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:javaclaw}?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    user: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:NyD0+oFDoOB+9cdVtnMonWFf4ZkDpTTs}
    locations: classpath:db/migration
    baseline-on-migrate: true

  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-8b71fb8815884080b52bd3b670b3b599}
      chat:
        options:
          model: ${JAVACLAW_AGENT_MODEL:qwen-plus}
    mcp:
      client:
        enabled: false

javaclaw:
  server:
    port: ${JAVACLAW_PORT:3007}
    host: 0.0.0.0
  security:
    auth-token: ${JAVACLAW_AUTH_TOKEN:}
    crypto-key: ${JAVACLAW_CRYPTO_KEY:}
    dm-pairing-enabled: false
  agent:
    name: ${JAVACLAW_AGENT_NAME:javaclaw}
    model: ${JAVACLAW_AGENT_MODEL:qwen-max}
    max-turns: 128
    timeout-seconds: 300
    max-tool-result-chars: 16000
    max-context-tokens: 128000
    tool-execution-timeout-seconds: 60
    max-parallel-tool-calls: 8
    history-limit: 50
    loop-detector-window-size: 8
    loop-detector-warn-threshold: 3
    loop-detector-terminate-threshold: 5
    loop-detector-excluded-tools: []
    non-retryable-tools: []
    approval-required-tools: []
    enable-parallel-tool-calls: true
    condenser-keep-recent: 20
    condenser-summary-length: 200
    condenser-min-turns-between: 5
  skills:
    dir: ${JAVACLAW_SKILLS_DIR:/Users/user/Documents/code/GitHub/JavaClaw/skills/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.atm.javaclaw: DEBUG
    org.springframework.data.r2dbc: DEBUG
    org.springframework.web.reactive: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
